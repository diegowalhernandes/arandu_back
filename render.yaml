services:
  - type: web
    name: arandu-back
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ARANDU_USE_MOCK
        value: "true"
      - key: ARANDU_DEBUG
        value: "false"
